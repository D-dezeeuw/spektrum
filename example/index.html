<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spektrum</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0f10;
    color: #eee;
    font-family: ui-monospace, Menlo, monospace;
  }
  .panel {
    width: min(420px, 90vw);
    padding: 24px;
    background: #1a1a1c;
    border: 1px solid #2a2a2e;
    border-radius: 6px;
  }
  h1 {
    margin: 0 0 16px;
    font-size: 12px;
    color: #888;
    font-weight: normal;
    letter-spacing: 0.18em;
  }
  .readout { font-size: 64px; line-height: 1; margin-bottom: 16px; }
  .readout small { font-size: 14px; color: #666; margin-left: 8px; letter-spacing: 0.1em; }
  .gauge {
    height: 8px;
    background: #2a2a2e;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .gauge > div {
    height: 100%;
    background: linear-gradient(90deg, #4ade80, #22c55e);
    transition: width 120ms ease-out;
  }
  .warning {
    margin: 0 0 16px;
    padding: 8px 12px;
    background: #2a1717;
    border: 1px solid #5a2424;
    color: #ef4444;
    border-radius: 4px;
    font-size: 12px;
    letter-spacing: 0.1em;
  }
  .status {
    font-size: 11px;
    color: #888;
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }
  .status span { color: #4ade80; }
  .set-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
    font-size: 11px;
    color: #888;
    letter-spacing: 0.1em;
  }
  .set-row input {
    flex: 1;
    padding: 6px 10px;
    background: #26262a;
    border: 1px solid #36363c;
    color: #eee;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
  }
  .controls { display: flex; gap: 8px; }
  button {
    flex: 1;
    padding: 10px;
    background: #26262a;
    border: 1px solid #36363c;
    color: #eee;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  button:hover:not(:disabled) { background: #2f2f34; }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .hourglass {
    position: fixed;
    bottom: 16px;
    right: 16px;
    width: 44px;
    height: 44px;
    padding: 0;
    border-radius: 50%;
    background: #26262a;
    border: 1px solid #36363c;
    color: #aaa;
    font-size: 18px;
    cursor: pointer;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .hourglass:hover { background: #2f2f34; }

  .timeline {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #14141a;
    border-top: 1px solid #2a2a2e;
    padding: 16px 72px 16px 24px;
    z-index: 50;
    display: none;
  }
  .timeline.open { display: block; }

  .scrub {
    width: 100%;
    margin: 0 0 12px;
    accent-color: #4ade80;
  }
  .scrub-label {
    font-size: 10px;
    color: #555;
    letter-spacing: 0.15em;
    margin-bottom: 6px;
  }
  .log {
    font-size: 11px;
    color: #777;
    border-top: 1px solid #26262a;
    padding-top: 10px;
    margin-top: 4px;
    max-height: 140px;
    overflow-y: auto;
    white-space: pre;
  }
  .log > div { padding: 2px 0; }
  .log .empty {
    color: #444;
    font-style: italic;
    padding: 6px 0;
  }
</style>
</head>
<body>
  <div class="panel">
    <h1>SPEKTRUM / GAS</h1>

    <div class="readout">
      <span>{{gas.value}}</span><small>UNITS</small>
    </div>

    <div class="status">
      STATUS: <span data-action="cycle" data-fn="setText" data-id="gas.statusText">--</span>
    </div>

    <div class="gauge">
      <div data-action="cycle" data-fn="setStyle" data-id="gas.value"
           data-prop="width" data-suffix="%" style="width: 0%"></div>
    </div>

    <div class="warning" data-if="gas.empty">⚠ TANK EMPTY</div>

    <div class="controls">
      <button :disabled="gas.full"
              data-action="click" data-fn="trigger" data-id="gas.value"
              data-value="10" data-name="refuel">refuel +10</button>
      <button :disabled="gas.empty"
              data-action="click" data-fn="trigger" data-id="gas.value"
              data-value="-5" data-name="burn">burn -5</button>
    </div>

    <div class="set-row">
      <label>SET</label>
      <input type="number" min="0" max="100" step="1"
             :value="gas.value"
             data-action="input" data-fn="setValue" data-id="gas.value"
             data-name="manual">
    </div>
  </div>

  <button class="hourglass"
          data-action="click" data-fn="toggle"
          data-target=".timeline" data-class="open"
          title="Toggle timeline">⏳</button>

  <div class="timeline">
    <div class="scrub-label">TIMELINE</div>
    <input id="scrub" class="scrub" type="range" min="0" max="0" value="0"
           data-action="input" data-fn="scrub">

    <div class="log" data-each="recentEvents" data-as="event">
      <div>{{event.display}}</div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
