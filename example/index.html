<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spektrum</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<style>
  :root {
    color-scheme: dark;
    --bg: #0f0f10;
    --panel: #1a1a1c;
    --line: #2a2a2e;
    --text: #eee;
    --text-dim: #888;
    --text-faint: #555;
    --accent: #4ade80;
    --button: #26262a;
    --button-line: #36363c;
    --hover: #2f2f34;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, Menlo, monospace;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 24px 24px 8px;
    text-align: center;
  }
  header .logo {
    display: block;
    margin: 0 auto 4px;
    max-width: 320px;
    width: 80%;
    height: auto;
  }
  header p {
    margin: 0;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.18em;
  }

  main {
    flex: 1;
    display: flex;
    gap: 24px;
    padding: 24px;
    max-width: 920px;
    margin: 0 auto;
    width: 100%;
    flex-wrap: wrap;
  }

  .panel {
    flex: 1;
    min-width: 280px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 24px;
    display: flex;
    flex-direction: column;
  }
  .panel h2 {
    margin: 0 0 16px;
    font-size: 11px;
    color: var(--text-dim);
    font-weight: normal;
    letter-spacing: 0.18em;
  }

  button, input {
    font-family: inherit;
    font-size: 13px;
  }
  button {
    padding: 8px 12px;
    background: var(--button);
    border: 1px solid var(--button-line);
    color: var(--text);
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover:not(:disabled) { background: var(--hover); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* counter panel */
  #counter .readout {
    font-size: 72px;
    text-align: center;
    margin: 16px 0 4px;
    color: var(--text-dim);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    transition: color 120ms ease-out;
  }
  #counter .readout.positive { color: var(--accent); }
  #counter .readout.negative { color: #ef4444; }
  #counter .meta {
    text-align: center;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.15em;
    margin-bottom: 24px;
  }
  #counter .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  #counter .controls button { flex: 1; }
  #counter .set {
    width: 100%;
    padding: 8px 12px;
    background: var(--button);
    border: 1px solid var(--button-line);
    color: var(--text);
    border-radius: 4px;
    margin-bottom: 12px;
  }

  /* basket panel */
  #basket .kinds {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  #basket .filter {
    width: 100%;
    padding: 6px 10px;
    background: var(--button);
    border: 1px solid var(--button-line);
    color: var(--text);
    border-radius: 4px;
    margin-bottom: 12px;
    font-size: 12px;
  }
  #basket .kinds button {
    flex: 1;
    font-size: 28px;
    padding: 12px 0;
  }
  #basket .items {
    list-style: none;
    padding: 0;
    margin: 0 0 12px;
    flex: 1;
    overflow-y: auto;
    max-height: 240px;
  }
  #basket .items li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px;
    background: #232328;
    border-radius: 4px;
    margin-bottom: 4px;
    font-size: 13px;
  }
  #basket .items .remove {
    padding: 0 8px;
    background: transparent;
    border: none;
    color: var(--text-faint);
    font-size: 16px;
    line-height: 1;
  }
  #basket .items .remove:hover {
    color: var(--text);
    background: transparent;
  }
  #basket .empty-msg {
    font-size: 12px;
    color: var(--text-faint);
    font-style: italic;
    text-align: center;
    padding: 32px 0;
  }
  #basket .foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: auto;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
  #basket .foot .undo { width: auto; }

  .undo {
    width: 100%;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    padding: 6px 12px;
  }

  footer {
    padding: 16px 24px 32px;
    text-align: center;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.15em;
  }
  footer a { color: var(--text-dim); text-decoration: none; }
  footer a:hover { color: var(--accent); }
</style>
</head>
<body>
  <header>
    <img src="Spektrum-logo.png" alt="Spektrum" class="logo">
    <p>two isolated instances · one page · no shared state</p>
  </header>

  <main>
    <section id="counter" class="panel">
      <h2>COUNTER</h2>

      <div class="readout" :class="{positive: count > 0, negative: count < 0}">{{count}}</div>
      <div class="meta">next: {{count + 1}} · doubled: {{count * 2}}</div>

      <div class="controls">
        <button data-action="click" data-fn="trigger" data-id="count" data-value="-1" data-name="dec">−1</button>
        <button data-action="click" data-fn="trigger" data-id="count" data-value="1"  data-name="inc">+1</button>
        <button data-action="click" data-fn="trigger" data-id="count" data-value="10" data-name="inc10">+10</button>
      </div>

      <input class="set" type="number" step="1" data-model="count"
             aria-label="set count directly" placeholder="set directly">

      <button class="undo"
              data-action="click" data-fn="undo"
              :disabled="atSeed">↶ undo</button>
    </section>

    <section id="basket" class="panel">
      <h2>BASKET</h2>

      <div class="kinds">
        <button data-action="click" data-fn="addKind" data-name="🍎 apple"  aria-label="add apple"  title="apple">🍎</button>
        <button data-action="click" data-fn="addKind" data-name="🍌 banana" aria-label="add banana" title="banana">🍌</button>
        <button data-action="click" data-fn="addKind" data-name="🍇 grapes" aria-label="add grapes" title="grapes">🍇</button>
        <button data-action="click" data-fn="addKind" data-name="🥭 mango"  aria-label="add mango"  title="mango">🥭</button>
      </div>

      <input class="filter" type="text" data-model="filter" data-ref="filterInput"
             aria-label="filter basket" placeholder="filter…">

      <ul class="items" data-each="items" data-as="item">
        <li data-if="!filter || item.label.includes(filter)">
          <span>{{item.label}}</span>
          <button class="remove" data-action="click" data-fn="removeAt" data-id="item"
                  aria-label="remove" title="remove">×</button>
        </li>
      </ul>

      <div class="empty-msg" data-if="!items || items.length === 0">your basket is empty — pick something</div>

      <div class="foot">
        <span>{{items.length}} items</span>
        <button class="undo"
                data-action="click" data-fn="undo"
                :disabled="atSeed">↶ undo</button>
      </div>
    </section>
  </main>

  <footer>
    <a href="https://github.com/D-dezeeuw/spektrum">github</a>
    ·
    <a href="https://www.npmjs.com/package/spektrum">npm</a>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
