name: Publish

on:
  push:
    tags:
      - 'v*'
  # Manual re-trigger so a botched publish run can be retried without
  # burning a version number on the next tag-push.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance attestation + OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      # NB: no `registry-url:` here. setup-node's registry-url feature
      # writes an .npmrc with `_authToken=${NODE_AUTH_TOKEN}` AND
      # defaults NODE_AUTH_TOKEN to the literal placeholder
      # `XXXXX-XXXXX-XXXXX-XXXXX`. With that placeholder in place, npm
      # treats the request as token-authenticated and never tries
      # OIDC, then the registry rejects the bogus token with 404.
      # npm's default registry is registry.npmjs.org anyway, so we
      # don't need to set it.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 20
      # ships with npm 10.x, which silently falls back to anonymous
      # publish (ENEEDAUTH).
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm run size
      # No NODE_AUTH_TOKEN env: with a Trusted Publisher configured
      # for this workflow file at npmjs.com, npm picks up the OIDC
      # token from the GitHub Actions environment automatically.
      - run: npm publish --provenance --access public
