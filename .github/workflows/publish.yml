name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance attestation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 20
      # ships with npm 10.x, which silently falls back to anonymous
      # publish (ENEEDAUTH).
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm run size
      # No NODE_AUTH_TOKEN: with a Trusted Publisher configured for
      # this workflow file at npmjs.com, npm picks up the OIDC token
      # from the GitHub Actions environment automatically.
      - run: npm publish --provenance --access public
