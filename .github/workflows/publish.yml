name: Publish

on:
  push:
    tags:
      - 'v*'
  # Manual re-trigger so a botched publish run can be retried without
  # burning a version number on the next tag-push.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for `--provenance` attestation signing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm run size
      # Token-based auth via NPM_TOKEN secret (granular access token,
      # scoped to this package, with 2FA bypass enabled). The
      # `--provenance` flag still uses GitHub OIDC to sign the build
      # attestation — that's independent of publish auth and only
      # needs `id-token: write` above.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
